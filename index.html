<!DOCTYPE html>
<html lang="en">
<head>
     <meta name="comment-topic" content="commentsDemo">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Demo</title>
     <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="toasts.css">
</head>
<body>
   
      <!-- Comment Modal -->
      <div id="comment-modal-overlay" class="comment-modal-overlay">
        <div class="comment-mdl">
          <div class="comment-mdl-header"> Comments <button class="comment-close-btn" aria-label="Close Comments"> &times; </button>
          </div>
          <div class="comment-mdl-body" id="comment-modal-body">
            <!-- Comment Box -->
            <div class="comment-box">
              <input type="hidden" class="reply-parent-id" />
              <input type="hidden" class="reply-immediate-id" />
              <div class="add-comment">
                <div class="name-input-container">
                  <div class="input-wrapper">
                    <input type="text" class="name-input" placeholder="Your name" />
                  </div>
                  <div class="input-wrapper">
                    <input type="email" class="email-input" placeholder="Your email (optional)" />
                  </div>
                </div>
                <textarea placeholder="Share your thoughts..." rows="3" maxlength="500"></textarea>
                <div class="char-counter">0 / 500</div>
                <div class="comment-toolbar">
                  <button class="submit-btn">
                    <i class="fas fa-paper-plane"></i> Post </button>
                </div>
              </div>
              <div class="comment-sort">
                <span> Comments ( <strong class="comment-count">
                    <span class="loading-spinner"></span>
                  </strong> ) </span>
                <select>
                  <option value="desc">Most recent</option>
                  <option value="asc">Oldest</option>
                </select>
              </div>
              <!-- Pinned Comment -->
              <div class="comments-pinned">
                <div class="comment">
                  <div class="comment-header">
                    <div class="comment-avatar-gradient"></div>
                    <div class="comment-user">
                      <strong>BWS Bot <i class="fas fa-check-circle verified-badge" title="Verified"></i></strong>
                      <span class="time">Pinned</span>
                    </div>
                  </div>
                  <div class="comment-content">
                    <p> Please avoid hate, spam, or offensive content. Every comment is monitored, and we aim to keep this space respectful and safe for all users. </p>
                  </div>
                </div>
              </div>
              <div class="comments-section">
                <!-- Loaded comments here -->
              </div>
            </div>
          </div>
          <div class="comment-mdl-footer">
            <span>Be nice, constructive and respectful.</span>
            <button class="scroll-to-top-btn" title="Scroll to top">
              <!-- Up arrow SVG -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#767676" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </div>
       <div class="button-center"><button class="comment-trig-end-post comment-box-mld"> Join the Conversation (<span class="comment-count">0</span>) </button>
         </div> <!-- Scripts - ORDER MATTERS -->
    <script src="toasts.js"></script>
    <script src="script.js"></script>
     <!-- OPTIONAL  -->
     <script src="cursor.js"></script>
      <div class="cursor-follower" id="cursorFollower" style="left: 375px; top: 538px;"></div>
</body>
</body>
</html>
